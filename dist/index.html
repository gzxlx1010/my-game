<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dust2 FPS - CS2 Style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/my-game/assets/index-CzfjOqyE.js"></script>
    <link rel="stylesheet" crossorigin href="/my-game/assets/index-BRSXqv2V.css">
  </head>
  <body>
    <div id="game-container"></div>
    <div id="vignette"></div>
    
    <!-- 血屏效果 -->
    <div id="blood-screen">
      <div class="blood-corner top-left"></div>
      <div class="blood-corner top-right"></div>
      <div class="blood-corner bottom-left"></div>
      <div class="blood-corner bottom-right"></div>
      <div class="blood-vignette"></div>
    </div>
    
    <!-- 精致血条UI -->
    <div id="health-bar-container">
      <div class="health-bar-wrapper">
        <div class="health-bar-bg">
          <div class="health-bar-fill" id="health-fill">
            <div class="health-bar-shine"></div>
            <div class="health-bar-segments"></div>
          </div>
          <div class="health-bar-damage" id="health-damage"></div>
        </div>
        <div class="health-icon">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
          </svg>
        </div>
        <div class="health-text" id="health-text">100</div>
      </div>
      <div class="health-status" id="health-status">FULL HEALTH</div>
    </div>
    
    <!-- 医疗包提示 -->
    <div id="medkit-prompt">
      <div class="medkit-icon">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <rect x="3" y="8" width="18" height="8" fill="white"/>
          <rect x="8" y="3" width="8" height="18" fill="white"/>
          <rect x="3" y="10" width="18" height="4" fill="#ff3333"/>
          <rect x="10" y="3" width="4" height="18" fill="#ff3333"/>
        </svg>
      </div>
      <span class="medkit-hint">Press <strong>E</strong> to heal</span>
    </div>
    
    <!-- 医疗进度条 -->
    <div id="healing-bar-container">
      <div class="healing-bar-wrapper">
        <div class="healing-bar-label">HEALING</div>
        <div class="healing-bar-bg">
          <div class="healing-bar-fill" id="healing-fill"></div>
        </div>
        <div class="healing-bar-percent" id="healing-percent">0%</div>
      </div>
      <div class="healing-bar-hint">Stand still to continue healing</div>
    </div>
    
    <!-- 关卡信息面板 -->
    <div id="level-info">
      <div class="level-name">沙漠战场</div>
      <div class="level-enemies">击杀: <span id="level-progress">0 / 5</span></div>
      <div id="level-progress-container">
        <div id="level-progress-label">进度</div>
        <div id="level-progress">
          <div id="level-progress-fill"></div>
        </div>
      </div>
      <div id="level-target">目标: 击杀 5 名敌人</div>
    </div>
    
    <!-- 关卡消息提示 -->
    <div id="level-message"></div>
    
    <!-- 入口提示 -->
    <div id="portal-hint" class="portal-hint">出口已开启 - 前往入口</div>
    
    <div id="crosshair">
      <div class="crosshair-line horizontal left"></div>
      <div class="crosshair-line horizontal right"></div>
      <div class="crosshair-line vertical top"></div>
      <div class="crosshair-line vertical bottom"></div>
      <div class="dot"></div>
    </div>
    
    <div id="hud">
      <div id="weapon-info">
        <div id="weapon-slot-indicator">
          <span class="slot active" data-slot="1">1</span>
          <span class="slot" data-slot="2">2</span>
          <span class="slot" data-slot="3">3</span>
        </div>
        <span class="weapon-name">AK-47</span>
        <div id="ammo-display">
          <span class="current">30</span><span class="separator">/</span><span class="max">30</span>
        </div>
      </div>
    </div>
    
    <div id="movement-indicator">WALKING</div>
    <div id="sprint-indicator">SPRINTING</div>
    
    <div id="start-screen">
      <div class="start-content">
        <h1>DUST2</h1>
        <p class="subtitle">First Person Shooter</p>
        <button id="start-btn">Click to Play</button>
      </div>
    </div>
    
    <!-- 死亡屏幕 -->
    <div id="death-screen">
      <div class="death-content">
        <h1>YOU DIED</h1>
        <p class="death-subtitle">You have been eliminated</p>
        <button id="respawn-btn">Respawn</button>
      </div>
    </div>
  </body>
</html>
