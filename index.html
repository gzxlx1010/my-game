<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dust2 FPS - CS2 Style</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="game-container"></div>
    <div id="crosshair"></div>
    <div id="hud">
      <div id="weapon-info">
        <span id="weapon-name">AK-47</span>
      </div>
      <div id="controls-hint">
        <p>WASD - Move | Mouse - Look | Click - Shoot | Space - Jump</p>
      </div>
    </div>
    <div id="start-screen">
      <div class="start-content">
        <h1>DUST2 FPS</h1>
        <p class="subtitle">CS2 Style First Person Shooter</p>
        <button id="start-btn">CLICK TO PLAY</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
