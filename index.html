<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dust2 FPS - CS2 Style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="game-container"></div>
    <div id="vignette"></div>
    
    <div id="crosshair">
      <div class="crosshair-line horizontal left"></div>
      <div class="crosshair-line horizontal right"></div>
      <div class="crosshair-line vertical top"></div>
      <div class="crosshair-line vertical bottom"></div>
      <div class="dot"></div>
    </div>
    
    <div id="hud">
      <div id="weapon-info">
        <div id="weapon-slot-indicator">
          <span class="slot active" data-slot="1">1</span>
          <span class="slot" data-slot="2">2</span>
        </div>
        <span class="weapon-name">AK-47</span>
        <div id="ammo-display">
          <span class="current">30</span><span class="separator">/</span><span class="max">30</span>
        </div>
      </div>
    </div>
    
    <div id="controls-panel">
      <h3>Controls</h3>
      <div class="control-row">
        <div class="wasd-hint">
          <div class="key key-w">W</div>
          <div class="key key-a">A</div>
          <div class="key key-s">S</div>
          <div class="key key-d">D</div>
        </div>
        <span class="desc">移动</span>
      </div>
      <div class="control-row">
        <div class="key">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2L12 22M12 2L6 8M12 2L18 8"/>
          </svg>
        </div>
        <span class="desc">鼠标 - 视角</span>
      </div>
      <div class="control-row">
        <div class="key">LMB</div>
        <span class="desc">射击</span>
      </div>
      <div class="control-row">
        <div class="key">Space</div>
        <span class="desc">跳跃</span>
      </div>
      <div class="control-row">
        <div class="key">Shift</div>
        <span class="desc">疾跑</span>
      </div>
      <div class="control-row">
        <div class="key">R</div>
        <span class="desc">换弹</span>
      </div>
      <div class="control-row">
        <div class="key">1</div>
        <div class="key">2</div>
        <span class="desc">切换武器</span>
      </div>
      <div class="control-row">
        <div class="key">ESC</div>
        <span class="desc">释放鼠标</span>
      </div>
    </div>
    
    <div id="movement-indicator">WALKING</div>
    <div id="sprint-indicator">SPRINTING</div>
    
    <div id="start-screen">
      <div class="start-content">
        <h1>DUST2</h1>
        <p class="subtitle">First Person Shooter</p>
        <button id="start-btn">Click to Play</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
