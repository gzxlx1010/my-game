<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dust2 FPS - CS2 Style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/my-game/assets/index-CZq4C0ID.js"></script>
    <link rel="stylesheet" crossorigin href="/my-game/assets/index-hs7mCK2g.css">
  </head>
  <body>
    <div id="game-container"></div>
    <div id="vignette"></div>
    
    <div id="crosshair">
      <div class="crosshair-line horizontal left"></div>
      <div class="crosshair-line horizontal right"></div>
      <div class="crosshair-line vertical top"></div>
      <div class="crosshair-line vertical bottom"></div>
      <div class="dot"></div>
    </div>
    
    <div id="hud">
      <div id="weapon-info">
        <div id="weapon-slot-indicator">
          <span class="slot active" data-slot="1">1</span>
          <span class="slot" data-slot="2">2</span>
          <span class="slot" data-slot="3">3</span>
        </div>
        <span class="weapon-name">AK-47</span>
        <div id="ammo-display">
          <span class="current">30</span><span class="separator">/</span><span class="max">30</span>
        </div>
      </div>
    </div>
    
    <div id="movement-indicator">WALKING</div>
    <div id="sprint-indicator">SPRINTING</div>
    
    <div id="start-screen">
      <div class="start-content">
        <h1>DUST2</h1>
        <p class="subtitle">First Person Shooter</p>
        <button id="start-btn">Click to Play</button>
      </div>
    </div>
  </body>
</html>
